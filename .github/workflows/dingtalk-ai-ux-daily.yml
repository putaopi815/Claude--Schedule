name: "DingTalk: AI+UX Daily Digest"

on:
  # 触发条件1: ai-ux-daily 目录下新日报推送到 main 时自动发送
  push:
    branches: [main]
    paths:
      - 'ai-ux-daily/*-ai-ux-daily.md'

  # 触发条件2: 每周一北京时间 9:00 自动发送
  schedule:
    - cron: '0 1 * * 1'  # UTC 01:00 = 北京时间 09:00，每周一

  # 触发条件3: 手动触发
  workflow_dispatch:
    inputs:
      date:
        description: '日报日期 (YYYY-MM-DD)，留空则发送最新'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-ux-daily
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python3 dingtalk_notify.py "${{ github.event.inputs.date }}"
          else
            python3 dingtalk_notify.py
          fi
