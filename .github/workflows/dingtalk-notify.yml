name: DingTalk Notification

on:
  push:
    branches:
      - '**'
    paths:
      - 'output/**/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect task and send DingTalk notification
        run: |
          # Find the changed markdown file in output/
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'output/**/*.md' 2>/dev/null || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No output markdown files changed, skipping."
            exit 0
          fi

          echo "Changed files: $CHANGED_FILES"

          # Process each changed file
          for FILE in $CHANGED_FILES; do
            if [ ! -f "$FILE" ]; then
              echo "File not found: $FILE, skipping."
              continue
            fi

            # Detect task from path
            case "$FILE" in
              output/ux-ai-daily/*)
                TITLE="UX-AI-Daily Report"
                WEBHOOK_URL="${{ secrets.DINGTALK_WEBHOOK_UX_AI_DAILY }}"
                ;;
              output/github-claude-skill/*)
                TITLE="GitHub+Claude-Skill Report"
                WEBHOOK_URL="${{ secrets.DINGTALK_WEBHOOK_GITHUB_CLAUDE_SKILL }}"
                ;;
              output/alpha-radar/*)
                TITLE="Alpha Radar Report"
                WEBHOOK_URL="${{ secrets.DINGTALK_WEBHOOK_ALPHA_RADAR }}"
                ;;
              output/weekly-intelligence/*)
                TITLE="Weekly Intelligence Report"
                WEBHOOK_URL="${{ secrets.DINGTALK_WEBHOOK_WEEKLY_INTELLIGENCE }}"
                ;;
              *)
                echo "Unknown task for file: $FILE, skipping."
                continue
                ;;
            esac

            if [ -z "$WEBHOOK_URL" ]; then
              echo "Warning: No webhook URL configured for $TITLE"
              continue
            fi

            echo "Sending notification for: $TITLE"

            # Build payload with jq for safe JSON encoding
            SUMMARY=$(head -50 "$FILE")
            PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg text "$SUMMARY" \
              '{msgtype:"markdown",markdown:{title:$title,text:$text}}')

            # Send to DingTalk
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "HTTP: $HTTP_CODE | Response: $BODY"

            if echo "$BODY" | grep -q '"errcode":0'; then
              echo "Sent successfully: $TITLE"
            else
              echo "::warning::DingTalk notification failed for $TITLE: $BODY"
            fi
          done
