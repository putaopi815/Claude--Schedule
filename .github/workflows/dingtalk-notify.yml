name: DingTalk Notify

on:
  # 触发条件1: 新日报文件推送到 main 分支时自动发送
  push:
    branches: [main]
    paths:
      - '*-ai-ux-daily.md'

  # 触发条件2: 每天北京时间 9:00 自动发送当天日报
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京时间 09:00

  # 触发条件3: 手动触发
  workflow_dispatch:
    inputs:
      date:
        description: '日报日期 (YYYY-MM-DD)，留空则发送最新'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python3 dingtalk_notify.py "${{ github.event.inputs.date }}"
          else
            python3 dingtalk_notify.py
          fi
