# DingTalk Webhook Configuration
# Each scheduled task has its own robot webhook
#
# How to get your webhook URL:
#   1. Open DingTalk group → "..." → Group Settings → Smart Assistant
#   2. Click on each robot → Copy Webhook URL
#   3. Paste the full URL (or just the access_token part) below
#
# Replace YOUR_ACCESS_TOKEN_HERE with actual tokens from each robot

# UX-AI-Daily (Every day 9:30)
DINGTALK_WEBHOOK_UX_AI_DAILY="https://oapi.dingtalk.com/robot/send?access_token=YOUR_ACCESS_TOKEN_HERE"

# GitHub + Claude-Skill (Every day 9:00)
DINGTALK_WEBHOOK_GITHUB_CLAUDE_SKILL="https://oapi.dingtalk.com/robot/send?access_token=YOUR_ACCESS_TOKEN_HERE"

# Claude Code Alpha Radar (Every day 10:00)
DINGTALK_WEBHOOK_ALPHA_RADAR="https://oapi.dingtalk.com/robot/send?access_token=YOUR_ACCESS_TOKEN_HERE"

# Claude Code Weekly Intelligence (Every Monday 10:30)
DINGTALK_WEBHOOK_WEEKLY_INTELLIGENCE="https://oapi.dingtalk.com/robot/send?access_token=YOUR_ACCESS_TOKEN_HERE"
